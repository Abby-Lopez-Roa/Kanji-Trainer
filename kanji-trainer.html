<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="漢字">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f13">
<title>漢字 Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#17171e;--surface2:#1e1e28;--surface3:#252533;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0eeeb;--text2:#8b8a96;--text3:#55535f;--accent:#c8a96e;--accent2:#e8c98a;--green:#5ecb8a;--green-bg:rgba(94,203,138,0.12);--red:#e8685a;--red-bg:rgba(232,104,90,0.12);--blue:#6eb4f7;--blue-bg:rgba(110,180,247,0.1);--amber:#f0a84a;--amber-bg:rgba(240,168,74,0.1);--radius:12px;--radius-lg:18px;--radius-xl:24px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:'Syne',sans-serif;letter-spacing:0.05em;transition:color 0.2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen-inner{padding:20px 18px;padding-top:max(20px,env(safe-area-inset-top))}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.app-title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.app-title span{color:var(--accent)}
.level-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:0.5px solid var(--border2);border-radius:99px;padding:5px 12px;font-size:12px;color:var(--text2)}
.level-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.xp-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-family:'DM Mono',monospace}
.xp-track{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:16px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.session-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.streak-badge{display:flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--border);border-radius:99px;padding:5px 10px;font-size:12px;font-family:'DM Mono',monospace}
.session-counts{margin-left:auto;display:flex;gap:8px;font-size:12px;font-family:'DM Mono',monospace}
.s-correct{color:var(--green)}
.s-wrong{color:var(--red)}

/* Session options panel */
.options-panel{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden}
.options-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.options-title{font-size:13px;font-weight:500;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase}
.options-chevron{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.25s}
.options-chevron.open{transform:rotate(180deg)}
.options-body{border-top:0.5px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.opt-label{font-size:13px;color:var(--text);flex:1}
.opt-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:0.5px solid var(--border2);border-radius:99px;cursor:pointer;transition:background 0.2s,border-color 0.2s}
.toggle-thumb{position:absolute;width:18px;height:18px;background:var(--text3);border-radius:50%;top:2px;left:2px;transition:transform 0.2s,background 0.2s}
.toggle input:checked~.toggle-track{background:rgba(200,169,110,0.2);border-color:rgba(200,169,110,0.4)}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);background:var(--accent)}
.toggle input:disabled~.toggle-track{opacity:0.4;cursor:not-allowed}
.toggle input:disabled~.toggle-thumb{opacity:0.4}
.mode-chips{display:flex;flex-wrap:wrap;gap:6px}
.mchip{cursor:pointer;font-size:11px;padding:5px 10px;border-radius:8px;border:0.5px solid var(--border2);color:var(--text3);background:transparent;font-family:'Syne',sans-serif;transition:all 0.15s}
.mchip.on{background:rgba(200,169,110,0.12);border-color:rgba(200,169,110,0.4);color:var(--accent)}
.lesson-mini-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.lchip{background:none;border:0.5px solid var(--border2);border-radius:7px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);padding:6px 0;cursor:pointer;transition:all 0.15s;text-align:center}
.lchip.on{background:rgba(200,169,110,0.12);border-color:rgba(200,169,110,0.4);color:var(--accent)}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-input{width:70px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:6px 10px;text-align:center}
.qty-input:focus{outline:none;border-color:var(--accent)}
.qty-hint{font-size:11px;color:var(--text3)}

/* Mode label */
.mode-label{display:inline-block;background:var(--surface);border:0.5px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--text2);margin-bottom:12px;letter-spacing:0.04em;text-transform:uppercase}

/* Flashcard */
.flashcard{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-xl);min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px 24px;position:relative;transition:border-color 0.3s}
.flashcard.correct-flash{border-color:var(--green);animation:flashG 0.5s ease}
.flashcard.wrong-flash{border-color:var(--red);animation:flashR 0.5s ease}
@keyframes flashG{0%{background:var(--green-bg)}100%{background:var(--surface)}}
@keyframes flashR{0%{background:var(--red-bg)}100%{background:var(--surface)}}
.kanji-big{font-family:'Noto Sans JP',sans-serif;font-size:80px;line-height:1;color:var(--text)}
.reading-big{font-family:'Noto Sans JP',sans-serif;font-size:32px;font-weight:500;color:var(--text)}
.compound-display{font-family:'Noto Sans JP',sans-serif;font-size:28px;font-weight:500;color:var(--text);text-align:center;line-height:1.4}
.eng-tag{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px;color:var(--text2);text-align:center}
.lesson-tag{position:absolute;top:12px;right:12px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.08em}
.missed-badge{position:absolute;top:12px;left:12px;background:var(--red-bg);border:0.5px solid rgba(232,104,90,0.3);border-radius:6px;font-size:10px;color:var(--red);padding:3px 7px;font-family:'DM Mono',monospace}
.type-badge{position:absolute;bottom:12px;right:12px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface2);border-radius:5px;padding:2px 6px}
.reveal-divider{width:40px;height:1px;background:var(--border2);margin:4px 0}
.reveal-section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.btn{cursor:pointer;border:0.5px solid var(--border2);border-radius:var(--radius);padding:13px 20px;font-size:14px;font-family:'Syne',sans-serif;font-weight:500;letter-spacing:0.01em;transition:all 0.15s;background:transparent;color:var(--text)}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(0.97)}
.btn-reveal{background:var(--accent);border-color:var(--accent);color:#0f0f13;font-weight:600;padding:13px 32px;margin-top:8px}
.btn-reveal:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-got{flex:1;background:var(--green-bg);border-color:rgba(94,203,138,0.3);color:var(--green);font-weight:600}
.btn-got:hover{background:rgba(94,203,138,0.2)}
.btn-missed{flex:1;background:var(--red-bg);border-color:rgba(232,104,90,0.3);color:var(--red);font-weight:600}
.btn-missed:hover{background:rgba(232,104,90,0.2)}
.btn-skip{background:none;border:none;color:var(--text3);font-size:13px;padding:10px;margin:4px auto 0;display:block;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:0.03em}
.btn-skip:hover{color:var(--text2)}

/* Progress counter */
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px;font-family:'DM Mono',monospace}
.prog-track{height:2px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.3s}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-0.03em}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:3px;letter-spacing:0.05em;text-transform:uppercase}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.section-head{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;margin-top:8px}
.lesson-group{margin-bottom:16px}
.lesson-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.lesson-group-title{font-size:13px;font-weight:500;color:var(--text2)}
.lesson-error-pill{font-size:11px;font-family:'DM Mono',monospace;color:var(--red);background:var(--red-bg);border-radius:99px;padding:2px 8px}
.wrong-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:6px}
.wrong-kanji{font-family:'Noto Sans JP',sans-serif;font-size:26px;min-width:34px;text-align:center}
.wrong-info{flex:1;min-width:0}
.wrong-reading{font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text2)}
.wrong-eng{font-size:11px;color:var(--text3);margin-top:1px}
.wrong-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);background:var(--red-bg);border-radius:6px;padding:3px 8px;white-space:nowrap}
.no-wrong{font-size:13px;color:var(--text3);text-align:center;padding:20px}
.reset-btn{width:100%;margin-top:16px;border-color:rgba(232,104,90,0.3);color:var(--red);font-size:13px;padding:11px}

/* Settings */
.setting-group{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
.setting-row{display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{flex:1;min-width:0}
.setting-name{font-size:14px;color:var(--text)}
.setting-desc{font-size:11px;color:var(--text3);margin-top:2px}
.lesson-grid-full{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:14px 16px}
.lesson-actions{display:flex;gap:8px;padding:0 16px 14px}
.lesson-actions button{flex:1;background:none;border:0.5px solid var(--border);border-radius:8px;font-size:12px;color:var(--text2);padding:7px;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s}
.lesson-actions button:hover{background:var(--surface2)}
.settings-footer{text-align:center;font-size:11px;color:var(--text3);margin-top:20px;line-height:1.7;padding-bottom:8px}
</style>
</head>

  {id:'kanji_to_kana', label:'Kanji → Reading', desc:'See kanji only, recall the reading'},
  {id:'kanji_eng_to_kana', label:'Kanji + Meaning → Reading', desc:'See kanji and meaning, recall the reading'}
];
const XP_PER_CORRECT = 10;
const XP_PER_LEVEL = 100;

function defaultState(){
  return {scores:{},xp:0,streak:0,bestStreak:0,totalCorrect:0,totalAnswered:0,
    activeModes:['kana_to_kanji','kanji_to_kana','kanji_eng_to_kana'],
    activeLessons:LESSONS.slice(),focusWrong:false,
    includeCompounds:true, includeSingles:true,
    sessionLimit:0};
}

let state = (()=>{
  try{const s=localStorage.getItem('kj_v3');if(s)return JSON.parse(s);}catch(e){}
  return defaultState();
})();

// migrate older saves
if(state.includeCompounds===undefined) state.includeCompounds=true;
if(state.includeSingles===undefined) state.includeSingles=true;
if(state.sessionLimit===undefined) state.sessionLimit=0;

function save(){try{localStorage.setItem('kj_v3',JSON.stringify(state));}catch(e){}}
function getLevel(){return Math.floor(state.xp/XP_PER_LEVEL)+1;}
function getLevelXP(){return state.xp%XP_PER_LEVEL;}

let card=null, revealed=false, modeId=null, view='study';
let sCorrect=0, sWrong=0;
let sessionDeck=[], sessionIdx=0, sessionActive=false;
let optionsOpen=false;

function buildSessionDeck(){
  let pool=RAW.filter(c=>{
    if(!state.activeLessons.includes(c.l)) return false;
    if(c.type==='compound'&&!state.includeCompounds) return false;
    if(c.type==='single'&&!state.includeSingles) return false;
    return true;
  });
  if(state.focusWrong){
    const w=pool.filter(c=>(state.scores[c.k]||{}).wrong>0);
    if(w.length) pool=w;
  }
  const wts=pool.map(c=>Math.max(1,1+((state.scores[c.k]||{}).wrong||0)*3));
  const tot=wts.reduce((a,b)=>a+b,0);
  const shuffled=[];
  const used=new Set();
  const limit=state.sessionLimit>0?Math.min(state.sessionLimit,pool.length):pool.length;
  let attempts=0;
  while(shuffled.length<limit&&attempts<pool.length*3){
    attempts++;
    let r=Math.random()*tot,i=0;
    for(;i<wts.length-1;i++){r-=wts[i];if(r<=0)break;}
    if(!used.has(i)){used.add(i);shuffled.push(pool[i]);}
  }
  return shuffled;
}

function pickCard(){
  if(sessionActive){
    if(sessionIdx>=sessionDeck.length){
      sessionActive=false; sessionDeck=[]; sessionIdx=0;
      return null;
    }
    const c=sessionDeck[sessionIdx++];
    const mp=state.activeModes.length?state.activeModes:MODES.map(m=>m.id);
    modeId=mp[Math.floor(Math.random()*mp.length)];
    return c;
  }
  let pool=RAW.filter(c=>{
    if(!state.activeLessons.includes(c.l)) return false;
    if(c.type==='compound'&&!state.includeCompounds) return false;
    if(c.type==='single'&&!state.includeSingles) return false;
    return true;
  });
  if(state.focusWrong){
    const w=pool.filter(c=>(state.scores[c.k]||{}).wrong>0);
    if(w.length) pool=w;
  }
  if(!pool.length) return null;
  const mp=state.activeModes.length?state.activeModes:MODES.map(m=>m.id);
  modeId=mp[Math.floor(Math.random()*mp.length)];
  const wts=pool.map(c=>Math.max(1,1+((state.scores[c.k]||{}).wrong||0)*3));
  const tot=wts.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,i=0;
  for(;i<wts.length-1;i++){r-=wts[i];if(r<=0)break;}
  return pool[i];
}

    return `<div class="screen"><div class="screen-inner">
      <div class="app-header"><span class="app-title"><span>漢字</span> Trainer</span><span class="level-pill"><span class="level-dot"></span>Lv ${getLevel()}</span></div>

function statsScreen(){
  const acc=state.totalAnswered?Math.round(state.totalCorrect/state.totalAnswered*100):0;

  const wrongByLesson={};
  RAW.forEach(c=>{
    const s=state.scores[c.k]||{};
    if((s.wrong||0)>0){
      if(!wrongByLesson[c.l]) wrongByLesson[c.l]=[];
      wrongByLesson[c.l].push({c,wrong:s.wrong});
    }
  });
  const lessonKeys=Object.keys(wrongByLesson).map(Number).sort((a,b)=>a-b);

  let wrongHTML='';
  if(lessonKeys.length===0){
    wrongHTML=`<div class="no-wrong">No trouble spots yet — keep going!</div>`;
  } else {
    wrongHTML=lessonKeys.map(l=>{
      const items=wrongByLesson[l].sort((a,b)=>b.wrong-a.wrong);
      const totalWrong=items.reduce((s,x)=>s+x.wrong,0);
      return `<div class="lesson-group">
        <div class="lesson-group-header">
          <span class="lesson-group-title">Lesson ${l}</span>
          <span class="lesson-error-pill">${totalWrong} missed</span>
        </div>
        ${items.map(({c,wrong})=>`<div class="wrong-card">
          <div class="wrong-kanji">${c.k}</div>
          <div class="wrong-info">
            <div class="wrong-reading">${c.r}</div>
            <div class="wrong-eng">${c.e}${c.type==='compound'?' · compound':''}</div>
          </div>
          <span class="wrong-count">${wrong}✗</span>
        </div>`).join('')}
      </div>`;
    }).join('');
  }

  return `<div class="screen"><div class="screen-inner">
    <div class="app-header"><span class="app-title"><span>漢字</span> Progress</span></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${state.totalAnswered}</div><div class="stat-lbl">cards reviewed</div></div>
      <div class="stat-card"><div class="stat-val${acc>=80?' green':''}">${acc}%</div><div class="stat-lbl">accuracy</div></div>
      <div class="stat-card"><div class="stat-val${state.streak>=5?' amber':''}">${state.streak}</div><div class="stat-lbl">streak</div></div>
      <div class="stat-card"><div class="stat-val">${state.bestStreak}</div><div class="stat-lbl">best streak</div></div>
    </div>
    <div class="section-head">Missed by lesson</div>
    ${wrongHTML}
    <button class="btn reset-btn" id="resetBtn">Reset all progress</button>
  </div></div>`;
}

function settingsScreen(){
  return `<div class="screen"><div class="screen-inner">
    <div class="app-header"><span class="app-title"><span>漢字</span> Settings</span></div>
    <div class="section-head">Lessons</div>
    <div class="setting-group">
      <div class="lesson-actions"><button id="allLs">All lessons</button><button id="noneLs">Clear all</button></div>
      <div class="lesson-grid-full">
        ${LESSONS.map(l=>`<button class="lchip${state.activeLessons.includes(l)?' on':''}" data-lesson2="${l}">L${l}</button>`).join('')}
      </div>
    </div>
    <div class="settings-footer">Progress saves automatically in this browser.<br>漢字 Trainer · L3–L21 · ${RAW.length} cards (${RAW.filter(c=>c.type==='compound').length} compounds)</div>
  </div></div>`;
}

function record(correct){
  const c=card;
  if(!state.scores[c.k]) state.scores[c.k]={correct:0,wrong:0};
  state.totalAnswered++;
  if(correct){
    state.scores[c.k].correct++;
    state.totalCorrect++;
    state.streak++;
    sCorrect++;
    if(state.streak>state.bestStreak) state.bestStreak=state.streak;
    state.xp+=XP_PER_CORRECT;
  } else {
    state.scores[c.k].wrong++;
    state.streak=0;
    sWrong++;
  }
  save();
  card=pickCard();
  revealed=false;
  render();
}

function bind(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{
      view=el.dataset.nav;
      if(view==='study'&&!card&&!sessionActive){card=pickCard();revealed=false;}
      render();
    });
  });
  const rev=document.getElementById('revBtn');
  if(rev) rev.addEventListener('click',()=>{revealed=true;render();});
  const got=document.getElementById('gotBtn');
  if(got) got.addEventListener('click',()=>record(true));
  const miss=document.getElementById('missBtn');
  if(miss) miss.addEventListener('click',()=>record(false));
  const skip=document.getElementById('skipBtn');
  if(skip) skip.addEventListener('click',()=>{card=pickCard();revealed=false;render();});
  const newSess=document.getElementById('newSession');
  if(newSess) newSess.addEventListener('click',()=>{
    sessionActive=false;sessionDeck=[];sessionIdx=0;
    card=pickCard();revealed=false;render();
  });
  const rst=document.getElementById('resetBtn');
  if(rst) rst.addEventListener('click',()=>{
    if(!confirm('Reset all progress and scores?')) return;
    const kept={activeModes:state.activeModes,activeLessons:state.activeLessons,
      focusWrong:state.focusWrong,includeCompounds:state.includeCompounds,
      includeSingles:state.includeSingles,sessionLimit:state.sessionLimit};
    state=Object.assign(defaultState(),kept);
    sCorrect=0;sWrong=0;card=null;revealed=false;sessionActive=false;
    save();view='study';render();
  });

  const optH=document.getElementById('optHeader');
  if(optH) optH.addEventListener('click',()=>{optionsOpen=!optionsOpen;render();});

  document.querySelectorAll('[data-mode]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.mode;
      if(state.activeModes.includes(id)){
        if(state.activeModes.length>1) state.activeModes=state.activeModes.filter(m=>m!==id);
      } else { state.activeModes.push(id); }
      save();render();
    });
  });

  document.querySelectorAll('[data-cardtype]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.cardtype;
      if(t==='singles'){
        state.includeSingles=!state.includeSingles;
        if(!state.includeCompounds&&!state.includeSingles) state.includeCompounds=true;
      } else {
        state.includeCompounds=!state.includeCompounds;
        if(!state.includeCompounds&&!state.includeSingles) state.includeSingles=true;
      }
      save();render();
    });
  });

  const ft=document.getElementById('focusTog');
  if(ft) ft.addEventListener('change',()=>{state.focusWrong=ft.checked;save();render();});

  const allL=document.getElementById('allL');
  if(allL) allL.addEventListener('click',()=>{state.activeLessons=LESSONS.slice();save();render();});
  const noneL=document.getElementById('noneL');
  if(noneL) noneL.addEventListener('click',()=>{state.activeLessons=[LESSONS[0]];save();render();});

  document.querySelectorAll('[data-lesson]').forEach(el=>{
    el.addEventListener('click',()=>{
      const l=parseInt(el.dataset.lesson);
      if(state.activeLessons.includes(l)){if(state.activeLessons.length>1)state.activeLessons=state.activeLessons.filter(x=>x!==l);}
      else state.activeLessons.push(l);
      save();render();
    });
  });

  const allLs=document.getElementById('allLs');
  if(allLs) allLs.addEventListener('click',()=>{state.activeLessons=LESSONS.slice();save();render();});
  const noneLs=document.getElementById('noneLs');
  if(noneLs) noneLs.addEventListener('click',()=>{state.activeLessons=[LESSONS[0]];save();render();});
  document.querySelectorAll('[data-lesson2]').forEach(el=>{
    el.addEventListener('click',()=>{
      const l=parseInt(el.dataset.lesson2);
      if(state.activeLessons.includes(l)){if(state.activeLessons.length>1)state.activeLessons=state.activeLessons.filter(x=>x!==l);}
      else state.activeLessons.push(l);
      save();render();
    });
  });

  const qi=document.getElementById('qtyInput');
  if(qi) qi.addEventListener('change',()=>{
    const v=parseInt(qi.value);
    state.sessionLimit=isNaN(v)||v<1?0:v;
    save();
  });
  const ss=document.getElementById('startSession');
  if(ss) ss.addEventListener('click',()=>{
    const qi2=document.getElementById('qtyInput');
    if(qi2){const v=parseInt(qi2.value);state.sessionLimit=isNaN(v)||v<1?0:v;save();}
    sessionDeck=buildSessionDeck();
    sessionIdx=0;
    sessionActive=true;
    sCorrect=0;sWrong=0;
    optionsOpen=false;
    card=pickCard();
    revealed=false;
    render();
  });
}

render();
</script>
</body>
</html>
