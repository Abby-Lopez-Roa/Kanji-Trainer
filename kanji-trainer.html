<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="漢字">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f13">
<title>漢字 Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f13;--surface:#17171e;--surface2:#1e1e28;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0eeeb;--text2:#8b8a96;--text3:#55535f;--accent:#c8a96e;--accent2:#e8c98a;--accent-ink:#0f0f13;--green:#5ecb8a;--green-bg:rgba(94,203,138,0.12);--red:#e8685a;--red-bg:rgba(232,104,90,0.12);--blue:#6eb4f7;--blue-bg:rgba(110,180,247,0.1);--amber:#f0a84a;--radius:12px;--radius-lg:18px;--radius-xl:24px}
[data-theme="light"]{--bg:#faf8f4;--surface:#ffffff;--surface2:#f0ede6;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--text:#1f1d1a;--text2:#6b6860;--text3:#a8a49a;--accent:#9c7a3c;--accent2:#b8954f;--accent-ink:#ffffff;--green:#2e9e63;--green-bg:rgba(46,158,99,0.12);--red:#cf4538;--red-bg:rgba(207,69,56,0.1);--blue:#3a7fc4;--blue-bg:rgba(58,127,196,0.1);--amber:#c87f1e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* Side panel */
.panel-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;opacity:0;pointer-events:none;transition:opacity 0.3s}
.panel-backdrop.open{opacity:1;pointer-events:auto}
.side-panel{position:fixed;top:0;left:-300px;width:270px;max-width:88vw;height:100%;height:100dvh;background:var(--bg);border-right:0.5px solid var(--border2);z-index:200;overflow-y:auto;overflow-x:hidden;transition:left 0.3s cubic-bezier(0.4,0,0.2,1);padding-bottom:env(safe-area-inset-bottom,20px);-webkit-overflow-scrolling:touch}
.side-panel.open{left:0;box-shadow:4px 0 24px rgba(0,0,0,0.5)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.panel-head-title{font-size:14px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text2)}
.panel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:2px 6px;line-height:1;font-family:'Syne',sans-serif}
.panel-close:hover{color:var(--text)}
.panel-section{padding:14px 16px;border-bottom:0.5px solid var(--border)}
.panel-section:last-child{border-bottom:none}
.panel-section-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace}
.panel-chips{display:flex;flex-wrap:wrap;gap:5px}
.pchip{cursor:pointer;font-size:11px;padding:5px 9px;border-radius:7px;border:0.5px solid var(--border2);color:var(--text3);background:transparent;font-family:'Syne',sans-serif;transition:all 0.15s;line-height:1.3;text-align:center}
.pchip:active{transform:scale(0.95)}
.pchip.on{background:rgba(200,169,110,0.12);border-color:rgba(200,169,110,0.4);color:var(--accent)}
.panel-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;gap:12px}
.panel-toggle-label{font-size:13px;color:var(--text);flex:1;min-width:0}
.panel-toggle-sub{font-size:10px;color:var(--text3);margin-top:2px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:0.5px solid var(--border2);border-radius:99px;cursor:pointer;transition:background 0.2s,border-color 0.2s}
.toggle-thumb{position:absolute;width:16px;height:16px;background:var(--text3);border-radius:50%;top:2px;left:2px;transition:transform 0.2s,background 0.2s}
.toggle input:checked~.toggle-track{background:rgba(200,169,110,0.2);border-color:rgba(200,169,110,0.4)}
.toggle input:checked~.toggle-thumb{transform:translateX(18px);background:var(--accent)}
.toggle input:disabled~.toggle-track{opacity:0.4;cursor:not-allowed}
.toggle input:disabled~.toggle-thumb{opacity:0.4}
.timer-chips{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px}
.lesson-grid-panel{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:8px}
.qty-row-panel{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-input{width:64px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;padding:6px 8px;text-align:center}
.qty-input:focus{outline:none;border-color:var(--accent)}
.qty-hint{font-size:11px;color:var(--text3)}
.panel-btn{width:100%;background:var(--accent);border:none;border-radius:var(--radius);color:var(--accent-ink);font-size:13px;font-weight:600;font-family:'Syne',sans-serif;padding:11px;cursor:pointer;margin-top:10px;transition:background 0.15s}
.panel-btn:hover{background:var(--accent2)}
.panel-btn:active{transform:scale(0.98)}

/* Nav */
.nav{display:flex;border-top:0.5px solid var(--border);background:var(--bg);padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:'Syne',sans-serif;letter-spacing:0.05em;transition:color 0.2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

/* Screen */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen-inner{padding:16px 16px;padding-top:max(16px,env(safe-area-inset-top))}

/* Header */
.app-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel-toggle-btn{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-toggle-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.5;stroke-linecap:round}
.app-title{font-size:19px;font-weight:700;letter-spacing:-0.02em;flex:1}
.app-title span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:6px}
.level-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:0.5px solid var(--border2);border-radius:99px;padding:4px 10px;font-size:11px;color:var(--text2);white-space:nowrap}
.level-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* Timer display */
.timer-display{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);padding:4px 8px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;cursor:pointer;transition:color 0.3s,border-color 0.3s;white-space:nowrap;letter-spacing:0.05em;user-select:none}
.timer-display.amber{color:var(--amber);border-color:rgba(240,168,74,0.4)}
.timer-display.red{color:var(--red);border-color:rgba(232,104,90,0.4);animation:timerPulse 1s infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* XP */
.xp-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace}
.xp-track{height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:12px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* Session stats row */
.session-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.streak-badge{display:flex;align-items:center;gap:4px;background:var(--surface);border:0.5px solid var(--border);border-radius:99px;padding:4px 9px;font-size:12px;font-family:'DM Mono',monospace}
.s-correct{color:var(--green);font-size:12px;font-family:'DM Mono',monospace}
.s-wrong{color:var(--red);font-size:12px;font-family:'DM Mono',monospace}
.s-practiced{color:var(--blue);font-size:12px;font-family:'DM Mono',monospace}
.stats-spacer{flex:1}

/* Progress bar */
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;font-family:'DM Mono',monospace}
.prog-track{height:2px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.3s}

/* Mode label */
.mode-label{display:inline-block;background:var(--surface);border:0.5px solid var(--border2);border-radius:6px;padding:3px 9px;font-size:10px;color:var(--text2);margin-bottom:10px;letter-spacing:0.04em;text-transform:uppercase}

/* Flashcard */
.flashcard{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-xl);min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:26px 22px;position:relative;transition:border-color 0.3s}
.flashcard.correct-flash{border-color:var(--green);animation:flashG 0.5s ease}
.flashcard.wrong-flash{border-color:var(--red);animation:flashR 0.5s ease}
@keyframes flashG{0%{background:var(--green-bg)}100%{background:var(--surface)}}
@keyframes flashR{0%{background:var(--red-bg)}100%{background:var(--surface)}}
.kanji-big{font-family:'Klee One',sans-serif;font-size:78px;line-height:1;color:var(--text)}
.reading-big{font-family:'Klee One',sans-serif;font-size:30px;font-weight:500;color:var(--text)}
.compound-display{font-family:'Klee One',sans-serif;font-size:26px;font-weight:500;color:var(--text);text-align:center;line-height:1.4}
.eng-tag{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:4px 11px;font-size:12px;color:var(--text2);text-align:center}
.lesson-tag{position:absolute;top:11px;right:11px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:0.06em}
.missed-badge{position:absolute;top:11px;left:11px;background:var(--red-bg);border:0.5px solid rgba(232,104,90,0.3);border-radius:6px;font-size:10px;color:var(--red);padding:2px 7px;font-family:'DM Mono',monospace}
.type-badge{position:absolute;bottom:11px;right:11px;font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--surface2);border-radius:5px;padding:2px 5px}
.readonly-badge{position:absolute;bottom:11px;left:11px;font-size:10px;font-family:'DM Mono',monospace;color:var(--blue);background:var(--blue-bg);border:0.5px solid rgba(110,180,247,0.25);border-radius:5px;padding:2px 7px}
.reveal-divider{width:36px;height:1px;background:var(--border2);margin:4px 0}
.reveal-section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Buttons */
.btn{cursor:pointer;border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 18px;font-size:14px;font-family:'Syne',sans-serif;font-weight:500;letter-spacing:0.01em;transition:all 0.15s;background:transparent;color:var(--text)}
.btn:active{transform:scale(0.97)}
.btn-reveal{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:600;padding:12px 30px;margin-top:8px}
.btn-reveal:hover{background:var(--accent2)}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-got{flex:1;background:var(--green-bg);border-color:rgba(94,203,138,0.3);color:var(--green);font-weight:600}
.btn-missed{flex:1;background:var(--red-bg);border-color:rgba(232,104,90,0.3);color:var(--red);font-weight:600}
.btn-skip{background:none;border:none;color:var(--text3);font-size:12px;padding:10px;margin:2px auto 0;display:block;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:0.03em}
.btn-skip:hover{color:var(--text2)}

/* Stats screen */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:20px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.stat-val{font-size:26px;font-weight:700;letter-spacing:-0.03em}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.05em;text-transform:uppercase}
.stat-val.green{color:var(--green)}
.stat-val.amber{color:var(--amber)}
.section-head{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:9px;margin-top:6px}
.lesson-group{margin-bottom:14px}
.lesson-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.lesson-group-title{font-size:13px;font-weight:500;color:var(--text2)}
.lesson-error-pill{font-size:10px;font-family:'DM Mono',monospace;color:var(--red);background:var(--red-bg);border-radius:99px;padding:2px 7px}
.wrong-card{display:flex;align-items:center;gap:11px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 13px;margin-bottom:5px}
.wrong-kanji{font-family:'Klee One',sans-serif;font-size:24px;min-width:32px;text-align:center}
.wrong-info{flex:1;min-width:0}
.wrong-reading{font-family:'Klee One',sans-serif;font-size:12px;color:var(--text2)}
.wrong-eng{font-size:10px;color:var(--text3);margin-top:1px}
.wrong-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);background:var(--red-bg);border-radius:6px;padding:3px 7px;white-space:nowrap}
.no-wrong{font-size:13px;color:var(--text3);text-align:center;padding:18px}
.reset-btn{width:100%;margin-top:14px;border:0.5px solid rgba(232,104,90,0.3);background:none;color:var(--red);font-size:12px;padding:10px;border-radius:var(--radius);cursor:pointer;font-family:'Syne',sans-serif}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:0.5px solid var(--border2);border-radius:99px;padding:8px 18px;font-size:13px;color:var(--text);z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* Pin button on flashcard */
.pin-btn{position:absolute;top:9px;left:50%;transform:translateX(-50%);background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:4px;opacity:0.35;transition:opacity 0.15s,transform 0.15s}
.pin-btn.pinned{opacity:1}
.pin-btn:active{transform:translateX(-50%) scale(1.2)}

/* Theme toggle button */
.theme-btn{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;line-height:1}

/* Shuffle button */
.shuffle-btn{width:100%;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:12px;font-family:'Syne',sans-serif;padding:9px;cursor:pointer;margin-top:6px}
.shuffle-btn:hover{background:var(--surface2)}

/* Glossary */
.glossary-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.glossary-chevron{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform 0.25s}
.glossary-chevron.open{transform:rotate(180deg)}
.glossary-body{margin-top:10px;display:flex;flex-direction:column;gap:9px}
.gloss-term{font-size:12px}
.gloss-name{color:var(--text);font-weight:500}
.gloss-def{color:var(--text3);font-size:11px;line-height:1.5;margin-top:1px}

/* Pinned filter chip in panel */
.pin-count{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:4px}

/* Drill summary */
.summary-head{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.summary-emoji{font-size:38px;margin-bottom:6px}
.summary-title{font-size:18px;font-weight:600;letter-spacing:-0.01em}
.summary-sub{font-size:12px;color:var(--text3);margin-top:3px}
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.sum-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px}
.sum-val{font-size:24px;font-weight:700;letter-spacing:-0.03em}
.sum-val.green{color:var(--green)}
.sum-val.amber{color:var(--amber)}
.sum-lbl{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
.sum-section{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin:14px 0 9px}
/* bar chart */
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.bar-kanji{font-family:'Klee One',sans-serif;font-size:18px;min-width:30px;text-align:center;color:var(--text)}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 0.4s}
.bar-fill.ok{background:var(--green)}
.bar-fill.warn{background:var(--amber)}
.bar-fill.bad{background:var(--red)}
.bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:42px;text-align:right}
.all-firsttry{font-size:13px;color:var(--green);text-align:center;padding:14px;background:var(--green-bg);border-radius:var(--radius);border:0.5px solid rgba(94,203,138,0.25)}
/* practiced list */
.prac-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:8px 11px;margin-bottom:5px}
.prac-kanji{font-family:'Klee One',sans-serif;font-size:20px;min-width:28px;text-align:center}
.prac-info{flex:1;min-width:0}
.prac-reading{font-family:'Klee One',sans-serif;font-size:12px;color:var(--text2)}
.prac-eng{font-size:10px;color:var(--text3);margin-top:1px}
.prac-badge{font-size:10px;font-family:'DM Mono',monospace;border-radius:6px;padding:3px 8px;white-space:nowrap}
.prac-badge.first{color:var(--green);background:var(--green-bg)}
.prac-badge.retry{color:var(--amber);background:rgba(240,168,74,0.12)}
.prac-badge.hard{color:var(--red);background:var(--red-bg)}
/* summary buttons */
.summary-btns{display:flex;gap:8px;margin-top:18px}
.summary-btns .btn{flex:1;padding:12px 10px;font-size:13px}
/* new-drill inline setup */
.nds{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:14px;margin-top:14px;animation:fadeUp 0.25s ease}
.nds-title{font-size:13px;font-weight:600;margin-bottom:12px;letter-spacing:0.02em}
.nds-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.nds-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.nds-lessons{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:14px}
.nds-pin-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.nds-pin-label{font-size:12px;color:var(--text)}
.nds-pin-sub{font-size:10px;color:var(--text3);margin-top:1px}
.nds-btns{display:flex;gap:8px}
.nds-btns button{flex:1;border-radius:var(--radius);font-size:13px;font-family:'Syne',sans-serif;padding:10px;cursor:pointer;font-weight:500}
.nds-go{background:var(--accent);border:none;color:var(--accent-ink);font-weight:600}
.nds-cancel{background:none;border:0.5px solid var(--border2);color:var(--text2)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const RAW = [
  // L3

function defaultState(){
  return{
    scores:{},xp:0,streak:0,bestStreak:0,totalCorrect:0,totalAnswered:0,
    activeModes:['kana_to_kanji','kanji_to_kana','kanji_eng_to_kana'],
    activeLessons:LESSONS.slice(),
    focusWrong:false,
    includeCompounds:true,includeSingles:true,includeReadingOnly:true,

    timerEnabled:false,timerMinutes:10,
    showStats:{streak:true,correct:true,wrong:true,practiced:false}
  };
}

let state=(()=>{
  try{const s=localStorage.getItem('kj_v4');if(s){const p=JSON.parse(s);
    if(!p.showStats)p.showStats={streak:true,correct:true,wrong:true,practiced:false};
    if(p.includeReadingOnly===undefined)p.includeReadingOnly=true;
    if(p.masteryMode===undefined)p.masteryMode=false;
    if(p.timerEnabled===undefined){p.timerEnabled=false;p.timerMinutes=10;}
    if(p.redemptionMode===undefined)p.redemptionMode=false;
    if(p.pinnedOnly===undefined)p.pinnedOnly=false;
    if(p.includePinned===undefined)p.includePinned=false;
    if(!Array.isArray(p.pinned))p.pinned=[];
    if(!p.theme)p.theme='dark';
    return p;
  }}catch(e){}
  return defaultState();
})();

function save(){try{localStorage.setItem('kj_v4',JSON.stringify(state));}catch(e){}}
function getLevel(){return Math.floor(state.xp/XP_PER_LEVEL)+1;}
function getLevelXP(){return state.xp%XP_PER_LEVEL;}

// ─── Pin / theme helpers ─────────────────────────────────────────────────────
function isPinned(k){return state.pinned.includes(k);}
function togglePin(k){
  if(isPinned(k))state.pinned=state.pinned.filter(x=>x!==k);
  else state.pinned.push(k);
  save();
}
function applyTheme(){document.documentElement.setAttribute('data-theme',state.theme==='light'?'light':'dark');}

// ─── Timer ──────────────────────────────────────────────────────────────────
function fmtTime(s){
  const m=Math.floor(s/60),sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function timerUrgency(){
  if(timerSecondsLeft<=30)return'red';
  if(timerSecondsLeft<=60)return'amber';
  return'';
}
function startTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerSecondsLeft=state.timerMinutes*60;
  timerRunning=true;
  timerInterval=setInterval(()=>{
    timerSecondsLeft--;
    if(timerSecondsLeft<=0){
      timerSecondsLeft=0;
      clearInterval(timerInterval);
      timerInterval=null;
      timerRunning=false;
      showToast('⏱ Time\'s up!');
    }
    const el=document.getElementById('timerEl');
    if(el){
      el.textContent=fmtTime(timerSecondsLeft);
      el.className='timer-display '+(timerSecondsLeft<=30?'red':timerSecondsLeft<=60?'amber':'');
    }
  },1000);
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=null;
  timerRunning=false;
}
function toggleTimer(){
  if(timerRunning){stopTimer();}
  else{startTimer();}
  render();
}

// ─── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg,dur=2800){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add('show'),30);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),320);},dur);
}

// ─── Pool / card picking ─────────────────────────────────────────────────────
function modesForCard(c){
  const mp=state.activeModes.length?state.activeModes:MODES.map(m=>m.id);
  if(c.readingOnly)return mp.filter(m=>m!=='kana_to_kanji');
  return mp;
}

function buildPool(){
  let pool=RAW.filter(c=>{
    if(state.pinnedOnly&&!isPinned(c.k))return false;
    if(!state.activeLessons.includes(c.l))return false;
    if(c.type==='compound'&&!state.includeCompounds)return false;
    if(c.type==='single'&&!state.includeSingles)return false;
    if(c.readingOnly&&!state.includeReadingOnly)return false;
    if(c.readingOnly&&modesForCard(c).length===0)return false;
    return true;
  });
  if(state.includePinned&&!state.pinnedOnly){
    RAW.forEach(c=>{
      if(isPinned(c.k)&&!pool.includes(c)){
        if(c.readingOnly&&modesForCard(c).length===0)return;
        pool.push(c);
      }
    });
  }
  return pool;
}

function weightedPick(pool){
  const wts=pool.map(c=>Math.max(1,1+((state.scores[c.k]||{}).wrong||0)*3));
  const tot=wts.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot,i=0;
  for(;i<wts.length-1;i++){r-=wts[i];if(r<=0)break;}
  return pool[i];
}

function buildSessionDeck(){
  const pool=buildPool();
  if(state.focusWrong){const w=pool.filter(c=>(state.scores[c.k]||{}).wrong>0);if(w.length)return shuffleWeighted(w);}
  return shuffleWeighted(pool);
}

function shuffleWeighted(pool){
  const wts=pool.map(c=>Math.max(1,1+((state.scores[c.k]||{}).wrong||0)*3));
  const tot=wts.reduce((a,b)=>a+b,0);
  const out=[],used=new Set();
  const lim=state.sessionLimit>0?Math.min(state.sessionLimit,pool.length):pool.length;
  let tries=0;
  while(out.length<lim&&tries<pool.length*4){
    tries++;
    let r=Math.random()*tot,i=0;
    for(;i<wts.length-1;i++){r-=wts[i];if(r<=0)break;}
    if(!used.has(i)){used.add(i);out.push(pool[i]);}
  }
  return out;
}

function pickCard(){
  if(sessionActive&&!state.masteryMode){
    if(sessionIdx>=sessionDeck.length){endSession();return null;}
    const c=sessionDeck[sessionIdx++];
    const modes=modesForCard(c);
    modeId=modes.length?modes[Math.floor(Math.random()*modes.length)]:'kanji_to_kana';
    return c;
  }
  const pool=buildPool();
  if(!pool.length)return null;
  const c=state.focusWrong?(()=>{const w=pool.filter(c=>(state.scores[c.k]||{}).wrong>0);return w.length?weightedPick(w):weightedPick(pool);})():weightedPick(pool);
  const modes=modesForCard(c);
  modeId=modes.length?modes[Math.floor(Math.random()*modes.length)]:'kanji_to_kana';
  return c;
}

function endSession(){
  sessionComplete=true;stopTimer();
}

// ─── Session start ───────────────────────────────────────────────────────────
function initDrillStats(deck){
  drillDeckCards=[...deck];
  drillStats={};
  deck.forEach(c=>{drillStats[c.k]={attempts:0,misses:0,firstTryCorrect:null,card:c};});
}

function startSession(){
  sCorrect=0;sWrong=0;sessionComplete=false;newDrillOpen=false;
  const deck=buildSessionDeck();
  if(!deck.length){showToast('No cards match your filters');return;}
  if(state.masteryMode){
    masteryQueue=[...deck];
    masteryMastered=new Set();
    masteryOriginalSize=deck.length;
    initDrillStats(deck);
    sessionActive=true;
    const c=masteryQueue[0];
    const modes=modesForCard(c);
    modeId=modes.length?modes[Math.floor(Math.random()*modes.length)]:'kanji_to_kana';
    card=c;
  }else{
    sessionDeck=deck;sessionIdx=0;sessionActive=true;
    card=pickCard();
  }
  revealed=false;
  if(state.timerEnabled)startTimer();
  panelOpen=false;
  render();
}

// Retry the just-finished drill with the same cards reshuffled
function retryDrill(){
  const deck=[...drillDeckCards];
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  sCorrect=0;sWrong=0;sessionComplete=false;newDrillOpen=false;
  masteryQueue=deck;masteryMastered=new Set();masteryOriginalSize=deck.length;
  initDrillStats(deck);
  sessionActive=true;
  const c=masteryQueue[0];const modes=modesForCard(c);
  modeId=modes.length?modes[Math.floor(Math.random()*modes.length)]:'kanji_to_kana';
  card=c;revealed=false;
  if(state.timerEnabled)startTimer();
  render();
}

// ─── Record answer ──────────────────────────────────────────────────────────
function record(correct){
  const c=card;
  if(!state.scores[c.k])state.scores[c.k]={correct:0,wrong:0};
  state.totalAnswered++;
  if(correct){
    state.scores[c.k].correct++;state.totalCorrect++;
    state.streak++;sCorrect++;
    if(state.streak>state.bestStreak)state.bestStreak=state.streak;
    state.xp+=XP_PER_CORRECT;
    if(state.redemptionMode&&state.scores[c.k].wrong>0)state.scores[c.k].wrong--;
  }else{
    state.scores[c.k].wrong++;state.streak=0;sWrong++;
  }
  save();

  if(state.masteryMode&&sessionActive){
    // Track per-card drill stats
    const st=drillStats[c.k];
    if(st){
      st.attempts++;
      if(st.firstTryCorrect===null)st.firstTryCorrect=correct;
      if(!correct)st.misses++;
    }
    if(correct){
      masteryMastered.add(c.k);
      masteryQueue.shift();
    }else{
      masteryQueue.shift();
      const minPos=Math.min(3,masteryQueue.length);
      const insertPos=minPos+Math.floor(Math.random()*(Math.max(masteryQueue.length-minPos,0)+1));
      masteryQueue.splice(insertPos,0,c);
    }
    if(masteryQueue.length===0){
      sessionComplete=true;card=null;stopTimer();
    }else{
      const nc=masteryQueue[0];
      const modes=modesForCard(nc);
      modeId=modes.length?modes[Math.floor(Math.random()*modes.length)]:'kanji_to_kana';
      card=nc;
    }
  }else if(sessionActive){
    card=pickCard();
    if(!card){sessionComplete=true;}
  }else{
    card=pickCard();
  }
  revealed=false;
  render();
}

    revealHTML=`<div class="reveal-divider"></div><div class="reveal-section"><div style="font-family:'Klee One',sans-serif;font-size:26px;font-weight:500;color:var(--text)">${c.r}</div></div>`;
  }

  return`<div class="screen-inner">
    <div class="app-header">
      <button class="panel-toggle-btn" id="panelToggle">${icon('menu')}</button>
      <span class="app-title"><span>漢字</span> Trainer</span>
      <div class="header-right">
        ${timerEl}
        <button class="theme-btn" id="themeBtn" title="Toggle light / dark">${state.theme==='light'?'🌙':'☀️'}</button>
        <span class="level-pill"><span class="level-dot"></span>Lv ${lv}</span>
      </div>
    </div>
    <div class="xp-row"><span>XP</span><span>${lvxp} / ${XP_PER_LEVEL}</span></div>
    <div class="xp-track"><div class="xp-fill" style="width:${pct}%"></div></div>
    ${statsRow}
    ${progHTML}
    <div class="mode-label">${mode.label}</div>
    <div class="flashcard" id="fc">
      <button class="pin-btn${isPinned(c.k)?' pinned':''}" id="pinBtn" title="${isPinned(c.k)?'Unpin':'Pin'} this card">📌</button>
      <span class="lesson-tag">L${c.l}</span>
      ${wc>0?`<span class="missed-badge">${wc}✗</span>`:''}
      ${isCompound?`<span class="type-badge">compound</span>`:''}
      ${isRO?`<span class="readonly-badge">reading only</span>`:''}
      ${front}
      ${revealed?revealHTML:''}
      ${!revealed?`<button class="btn btn-reveal" id="revBtn">Reveal</button>`:''}
    </div>
    ${revealed?`<div class="btn-row"><button class="btn btn-got" id="gotBtn">Got it ✓</button><button class="btn btn-missed" id="missBtn">Missed ✗</button></div>`:''}
    <button class="btn-skip" id="skipBtn">skip →</button>
  </div>`;
}

// ─── Stats Screen ─────────────────────────────────────────────────────────────
function statsScreen(){
  const acc=state.totalAnswered?Math.round(state.totalCorrect/state.totalAnswered*100):0;
  const wrongByLesson={};
  RAW.forEach(c=>{
    const s=state.scores[c.k]||{};
    if((s.wrong||0)>0){
      if(!wrongByLesson[c.l])wrongByLesson[c.l]=[];
      wrongByLesson[c.l].push({c,wrong:s.wrong});
    }
  });
  const lkeys=Object.keys(wrongByLesson).map(Number).sort((a,b)=>a-b);
  const wrongHTML=lkeys.length===0?`<div class="no-wrong">No trouble spots yet — keep going!</div>`:
    lkeys.map(l=>{
      const items=wrongByLesson[l].sort((a,b)=>b.wrong-a.wrong);
      const tw=items.reduce((s,x)=>s+x.wrong,0);
      return`<div class="lesson-group">
        <div class="lesson-group-header">
          <span class="lesson-group-title">Lesson ${l}</span>
          <span class="lesson-error-pill">${tw} missed</span>
        </div>
        ${items.map(({c,wrong})=>`<div class="wrong-card">
          <div class="wrong-kanji">${c.k}</div>
          <div class="wrong-info">
            <div class="wrong-reading">${c.r}</div>
            <div class="wrong-eng">${c.e}${c.type==='compound'?' · compound':''}${c.readingOnly?' · reading only':''}</div>
          </div>
          <span class="wrong-count">${wrong}✗</span>
        </div>`).join('')}
      </div>`;
    }).join('');
  return`<div class="screen-inner">
    <div class="app-header">
      <button class="panel-toggle-btn" id="panelToggle">${icon('menu')}</button>
      <span class="app-title"><span>漢字</span> Progress</span>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${state.totalAnswered}</div><div class="stat-lbl">reviewed</div></div>
      <div class="stat-card"><div class="stat-val${acc>=80?' green':''}">${acc}%</div><div class="stat-lbl">accuracy</div></div>
      <div class="stat-card"><div class="stat-val${state.streak>=5?' amber':''}">${state.streak}</div><div class="stat-lbl">streak</div></div>
      <div class="stat-card"><div class="stat-val">${state.bestStreak}</div><div class="stat-lbl">best streak</div></div>
    </div>
    <div class="section-head">Missed by lesson</div>
    ${wrongHTML}
    <button class="reset-btn" id="resetBtn">Reset all progress</button>
  </div>`;
}

// ─── Event binding ───────────────────────────────────────────────────────────
function bind(){
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click',()=>{view=el.dataset.nav;if(view==='study'&&!card){card=pickCard();revealed=false;}render();});
  });

  // Panel open/close
  const pt=document.getElementById('panelToggle');
  if(pt)pt.addEventListener('click',()=>{panelOpen=true;render();});
  const cp=document.getElementById('closePanel');
  if(cp)cp.addEventListener('click',()=>{panelOpen=false;render();});
  const bd=document.getElementById('backdrop');
  if(bd)bd.addEventListener('click',()=>{panelOpen=false;render();});

  // Panel: modes
  document.querySelectorAll('[data-mode]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.mode;
      if(state.activeModes.includes(id)){if(state.activeModes.length>1)state.activeModes=state.activeModes.filter(m=>m!==id);}
      else state.activeModes.push(id);
      save();render();
    });
  });

  // Panel: card types
  document.querySelectorAll('[data-ctype]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.ctype;
      if(t==='singles'){state.includeSingles=!state.includeSingles;if(!state.includeCompounds&&!state.includeSingles)state.includeCompounds=true;}
      else if(t==='compounds'){state.includeCompounds=!state.includeCompounds;if(!state.includeCompounds&&!state.includeSingles)state.includeSingles=true;}
      else if(t==='readingonly'){state.includeReadingOnly=!state.includeReadingOnly;}
      save();render();
    });
  });

  // Panel: mastery toggle
  const mt=document.getElementById('masteryTog');
  if(mt)mt.addEventListener('change',()=>{state.masteryMode=mt.checked;save();render();});

  // Panel: redemption toggle
  const rd=document.getElementById('redeemTog');
  if(rd)rd.addEventListener('change',()=>{state.redemptionMode=rd.checked;save();render();});

  // Panel: pinned-only toggle
  const po=document.getElementById('pinnedTog');
  if(po)po.addEventListener('change',()=>{state.pinnedOnly=po.checked;save();render();});

  // Panel: focus
  const ft=document.getElementById('focusTog');
  if(ft)ft.addEventListener('change',()=>{state.focusWrong=ft.checked;save();render();});

  // Panel: timer toggle
  const tt=document.getElementById('timerTog');
  if(tt)tt.addEventListener('change',()=>{
    state.timerEnabled=tt.checked;
    if(!state.timerEnabled)stopTimer();
    save();render();
  });

  // Panel: timer minutes
  document.querySelectorAll('[data-tmin]').forEach(el=>{
    el.addEventListener('click',()=>{
      state.timerMinutes=parseInt(el.dataset.tmin);
      timerSecondsLeft=0;
      if(timerRunning)stopTimer();
      save();render();
    });
  });

  // Panel: stats toggles
  document.querySelectorAll('[data-stat]').forEach(el=>{
    el.addEventListener('change',()=>{
      state.showStats[el.dataset.stat]=el.checked;
      save();render();
    });
  });

  // Panel: session qty
  const qi=document.getElementById('qtyIn');
  if(qi)qi.addEventListener('change',()=>{const v=parseInt(qi.value);state.sessionLimit=isNaN(v)||v<1?0:v;save();render();});

  // Panel: lessons
  const allL=document.getElementById('allL');
  if(allL)allL.addEventListener('click',()=>{state.activeLessons=LESSONS.slice();save();render();});
  const noneL=document.getElementById('noneL');
  if(noneL)noneL.addEventListener('click',()=>{state.activeLessons=[LESSONS[0]];save();render();});
  document.querySelectorAll('[data-lesson]').forEach(el=>{
    el.addEventListener('click',()=>{
      const l=parseInt(el.dataset.lesson);
      if(state.activeLessons.includes(l)){if(state.activeLessons.length>1)state.activeLessons=state.activeLessons.filter(x=>x!==l);}
      else state.activeLessons.push(l);
      save();render();
    });
  });

  // Panel: start session
  const sb=document.getElementById('startBtn');
  if(sb)sb.addEventListener('click',startSession);

  // Panel: shuffle & restart
  const shf=document.getElementById('shuffleBtn');
  if(shf)shf.addEventListener('click',()=>{sessionActive=false;masteryQueue=[];card=null;startSession();});

  // Panel: glossary toggle
  const gt=document.getElementById('glossToggle');
  if(gt)gt.addEventListener('click',()=>{glossaryOpen=!glossaryOpen;render();});

  // Study: reveal
  const rev=document.getElementById('revBtn');
  if(rev)rev.addEventListener('click',()=>{revealed=true;render();});

  // Study: got it / missed
  const got=document.getElementById('gotBtn');
  if(got)got.addEventListener('click',()=>record(true));
  const miss=document.getElementById('missBtn');
  if(miss)miss.addEventListener('click',()=>record(false));

  // Study: skip
  const skip=document.getElementById('skipBtn');
  if(skip)skip.addEventListener('click',()=>{card=pickCard();revealed=false;render();});

  // Study: back to free study after a normal session completes
  const ns=document.getElementById('newSessBtn');
  if(ns)ns.addEventListener('click',()=>{sessionActive=false;sessionComplete=false;card=pickCard();revealed=false;render();});

  // Drill summary: try again (reshuffled)
  const rt=document.getElementById('retryDrillBtn');
  if(rt)rt.addEventListener('click',retryDrill);

  // Drill summary: open new-drill setup
  const ond=document.getElementById('openNewDrillBtn');
  if(ond)ond.addEventListener('click',()=>{newDrillOpen=true;render();});

  // New-drill setup: lesson chips
  document.querySelectorAll('[data-ndslesson]').forEach(el=>el.addEventListener('click',()=>{
    const l=parseInt(el.dataset.ndslesson);
    if(state.activeLessons.includes(l)){if(state.activeLessons.length>1)state.activeLessons=state.activeLessons.filter(x=>x!==l);}
    else state.activeLessons.push(l);
    save();render();
  }));
  // New-drill setup: card count
  const ndc=document.getElementById('ndsCount');
  if(ndc)ndc.addEventListener('change',()=>{const v=parseInt(ndc.value);state.sessionLimit=isNaN(v)||v<1?0:v;save();render();});
  // New-drill setup: include pinned
  const ndp=document.getElementById('ndsPin');
  if(ndp)ndp.addEventListener('change',()=>{state.includePinned=ndp.checked;save();render();});
  // New-drill setup: cancel / go
  const ndcancel=document.getElementById('ndsCancel');
  if(ndcancel)ndcancel.addEventListener('click',()=>{newDrillOpen=false;render();});
  const ndgo=document.getElementById('ndsGo');
  if(ndgo)ndgo.addEventListener('click',()=>{
    state.masteryMode=true;
    sessionActive=false;sessionComplete=false;newDrillOpen=false;
    startSession();
  });

  // Study: pin toggle
  const pb=document.getElementById('pinBtn');
  if(pb)pb.addEventListener('click',()=>{if(card){togglePin(card.k);render();}});

  // Header: theme toggle
  const thb=document.getElementById('themeBtn');
  if(thb)thb.addEventListener('click',()=>{state.theme=state.theme==='light'?'dark':'light';save();render();});

  // Stats: reset
  const rb=document.getElementById('resetBtn');
  if(rb)rb.addEventListener('click',()=>{
    if(!confirm('Reset all progress?'))return;
    const kept={activeModes:state.activeModes,activeLessons:state.activeLessons,focusWrong:state.focusWrong,
      includeCompounds:state.includeCompounds,includeSingles:state.includeSingles,includeReadingOnly:state.includeReadingOnly,
      sessionLimit:state.sessionLimit,masteryMode:state.masteryMode,redemptionMode:state.redemptionMode,
      pinnedOnly:false,pinned:state.pinned,theme:state.theme,
      timerEnabled:state.timerEnabled,timerMinutes:state.timerMinutes,showStats:{...state.showStats}};
    state=Object.assign(defaultState(),kept);
    sCorrect=0;sWrong=0;card=null;revealed=false;sessionActive=false;masteryQueue=[];
    stopTimer();save();view='study';render();
  });

  // Timer display: tap to start/stop
  const tel=document.getElementById('timerEl');
  if(tel)tel.addEventListener('click',toggleTimer);
}

render();
</script>
</body>
</html>
